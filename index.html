<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 오늘 뭐 먹지? | 저녁 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
    <!-- Pretendard 폰트 불러오기 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <button id="mode-toggle" class="mode-toggle">🌙 다크 모드</button>
    
    <div class="container">
        <h1>오늘의 저녁 메뉴는?</h1>
        <p class="subtitle">나노바나나(Gemini 3.1)가 이미지를 그려줍니다</p>
        
        <div class="api-config">
            <input type="password" id="api-key" placeholder="Gemini API Key를 입력하세요">
            <small>API 키가 있으면 음식 이미지가 생성됩니다.</small>
        </div>

        <div id="numbers-container" class="numbers-container">
            <!-- 메뉴가 여기에 생성됩니다 -->
        </div>
        
        <button id="generate-button">메뉴 추천받기</button>
        
        <div class="history-section">
            <div class="history-title">최근 추천 기록</div>
            <div id="history-list" class="history-list">
                <!-- 기록이 여기에 추가됩니다 -->
            </div>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
