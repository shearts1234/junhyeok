<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - 오늘 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .error-code { font-size: 80px; font-weight: 800; color: #ff5252; margin: 0; }
        .error-msg { font-size: 24px; margin: 20px 0; font-weight: 700; }
        .home-btn {
            background: #ff5252;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            transition: transform 0.3s;
        }
        .home-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-msg">요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
        <p style="margin-bottom: 30px; opacity: 0.7;">메뉴 추천을 받으러 홈으로 돌아가 보시는 건 어떨까요?</p>
        <a href="index.html" class="home-btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
